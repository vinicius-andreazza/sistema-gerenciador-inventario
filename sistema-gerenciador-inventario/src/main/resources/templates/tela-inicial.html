<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Inventário</title>
    <link rel="stylesheet" href="css/tela-inicial.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">
    <header class="header">
        <div class="header-info">
            <h1>Dashboard de Inventário</h1>
            <p>Status em tempo real do seu estoque</p>
        </div>
        <div class="quick-search">
            <input type="text" id="searchInput" placeholder="Buscar item ou local...">
        </div>
    </header>

    <section class="metrics">
        <div class="metric-card">
            <div class="card-icon blue">📦</div>
            <div class="card-data">
                <h3>Total de Itens</h3>
                <span id="totalProducts">0</span>
            </div>
        </div>
        <div class="metric-card warning">
            <div class="card-icon yellow">⚠️</div>
            <div class="card-data">
                <h3>Abaixo do Mínimo</h3>
                <span id="lowStock">0</span>
            </div>
        </div>
        <div class="metric-card success">
            <div class="card-icon green">💰</div>
            <div class="card-data">
                <h3>Patrimônio Total</h3>
                <span id="totalValue">R$ 0,00</span>
            </div>
        </div>
        <div class="metric-card">
            <div class="card-icon purple">🏢</div>
            <div class="card-data">
                <h3>Fornecedores</h3>
                <span id="activeSuppliers">0</span>
            </div>
        </div>
    </section>

    <div class="dashboard-grid full-width-alerts">
        <section class="alerts-container">
            <div class="table-header">
                <h3>Alertas de Reposição Crítica</h3>
            </div>
            <div id="alertsList" class="alerts-list">
                </div>
        </section>
    </div>

    <section class="recent-products">
        <div class="table-header">
            <h2>Movimentações Recentes</h2>
            <button class="btn-view-all" onclick="goTo('products')">Ver Estoque Completo</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Tipo</th>
                    <th>Localização</th>
                    <th>Qtd Atual</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="recentTable"></tbody>
        </table>
    </section>
</div>

<script type="module" src="js/tela-inicial.js"></script>
<script src="js/sidebar.js"></script>
</body>
</html>
