<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Produtos</title>
    <link rel="stylesheet" href="css/items.css">
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/pagination.css">
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <header>
        <h1>Estoque - Materia Prima</h1>
        <button class="btn-new" onclick="openCreateModal()">+ Nova Materia Prima</button>
    </header>

    <section class="cards-container" id="cardsContainer"></section>
    <div th:replace="fragments/pagination :: pagination"></div>
    
</div>

<div class="modal" id="itemModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>

        <div class="modal-grid" id="modalBody"></div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="enableEdit()">Editar</button>
            <button class="btn-primary" onclick="saveEdit()">Salvar</button>
            <button class="btn-danger" onclick="deleteRawMaterial()">Excluir</button>
        </div>
    </div>
</div>

<!-- Modal Cadastro -->
<div class="modal" id="createModal">
    <div class="modal-content">
        <span class="close" onclick="closeCreateModal()">&times;</span>
        <h2>Novo Produto</h2>

        <form id="createForm" class="modal-grid">
            <input placeholder="Nome" id="c_name" required>
            <input placeholder="Categoria" id="c_category" required>
            <input placeholder="Descrição" id="c_description" required>
            <input type="number" placeholder="Quantidade" id="c_quantity" required>
            <input type="number" placeholder="Quantidade Mínima" id="c_minimumQuantity" required>
            <input placeholder="Unidade de Medida" id="c_measure" required>
            <input placeholder="Status" id="c_status" required>
            <input placeholder="Local" id="c_itemLocal" required>
            <input type="number" step="0.01" placeholder="Pacote" id="c_batch" required>
            <input type="number" step="0.01" placeholder="Valor Unitario" id="c_unitValue" required>
            <input type="number" step="0.01" placeholder="Fornecedores" id="c_suppliers" required>

            <button class="btn-primary" type="submit">Cadastrar</button>
        </form>
    </div>
</div>

<script type="module" src="js/rawMaterials.js"></script>
<script type="module" src="js/script.js"></script>
<script src="js/sidebar.js"></script>
</body>
</html>
